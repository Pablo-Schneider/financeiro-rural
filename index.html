<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Financeiro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
  background:#0f0f14;
  color:#fff;
  padding:15px;
}

.container{
  max-width:500px;
  margin:auto;
}

h1{
  text-align:center;
  margin-bottom:15px;
  color:#b983ff;
}

.card{
  background:#1a1a24;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

select,input,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#2a2a35;
  color:#fff;
}

button{
  background:#7c3aed;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#6d28d9;
}

.saldo{
  font-size:22px;
  font-weight:bold;
  text-align:center;
}

.receitas{ color:#22c55e; }
.despesas{ color:#ef4444; }

.cards{
  display:flex;
  gap:10px;
}

.cards .card{
  flex:1;
  text-align:center;
}

.lista{ margin-top:10px; }

.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#2a2a35;
  padding:10px;
  border-radius:8px;
  margin-top:8px;
}

.item-info{ flex:1; cursor:pointer; }

.valorReceita{ color:#22c55e; font-weight:bold; }
.valorDespesa{ color:#ef4444; font-weight:bold; }

.excluir{
  background:red;
  border:none;
  color:white;
  padding:5px 8px;
  border-radius:6px;
  cursor:pointer;
  width:auto;
  margin-top:0;
  margin-left:8px;
}

canvas{ margin-top:15px; }

#loading{
  text-align:center;
  padding:20px;
  color:#b983ff;
}

.empty{
  text-align:center;
  color:#666;
  padding:15px 0;
  font-size:0.9rem;
}

/* Modal */
.modal-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:100;
  align-items:center;
  justify-content:center;
}

.modal-overlay.open{ display:flex; }

.modal{
  background:#1a1a24;
  border-radius:12px;
  padding:24px;
  width:90%;
  max-width:400px;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}

.modal h3{
  margin-bottom:10px;
  color:#b983ff;
}

.modal .cancelar{
  background:#2a2a35;
  margin-top:8px;
}

.modal .cancelar:hover{
  background:#3a3a45;
}
</style>
</head>

<body>
<div class="container">

  <h1>💰 Controle Financeiro</h1>

  <div id="loading">🔄 Conectando ao Firebase...</div>

  <div id="app-content" style="display:none">

    <!-- Saldo + Mês -->
    <div class="card">
      <div class="topo">
        <label>Mês</label>
        <select id="mes" style="width:auto"></select>
      </div>
      <div class="saldo" id="saldoTotal">R$ 0,00</div>
    </div>

    <!-- Receitas / Despesas -->
    <div class="cards">
      <div class="card">
        <h3>Receitas</h3>
        <div class="receitas" id="totalReceitas">R$ 0,00</div>
      </div>
      <div class="card">
        <h3>Despesas</h3>
        <div class="despesas" id="totalDespesas">R$ 0,00</div>
      </div>
    </div>

    <!-- Formulário -->
    <div class="card">
      <h3>➕ Adicionar Lançamento</h3>
      <form id="form-lancamento">
        <input type="date" id="data">
        <input type="text" id="descricao" placeholder="Descrição" required>
        <input type="number" id="valor" placeholder="Valor" step="0.01" min="0.01" required>
        <select id="categoria">
          <option>Alimentação</option>
          <option>Transporte</option>
          <option>Moradia</option>
          <option>Saúde</option>
          <option>Lazer</option>
          <option>Salário</option>
          <option>Freelance</option>
          <option>Outros</option>
        </select>
        <select id="tipo">
          <option value="receita">Receita</option>
          <option value="despesa">Despesa</option>
        </select>
        <button type="submit">Adicionar</button>
      </form>
    </div>

    <!-- Lista + Gráfico -->
    <div class="card">
      <h3>📋 Lançamentos</h3>
      <div class="lista" id="lista"></div>
      <canvas id="grafico"></canvas>
    </div>

  </div>
</div>

<!-- Modal Edição -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>✏️ Editar Lançamento</h3>
    <input type="hidden" id="edit-id">
    <input type="date" id="edit-data">
    <input type="text" id="edit-descricao" placeholder="Descrição">
    <input type="number" id="edit-valor" placeholder="Valor" step="0.01">
    <select id="edit-categoria">
      <option>Alimentação</option>
      <option>Transporte</option>
      <option>Moradia</option>
      <option>Saúde</option>
      <option>Lazer</option>
      <option>Salário</option>
      <option>Freelance</option>
      <option>Outros</option>
    </select>
    <select id="edit-tipo">
      <option value="receita">Receita</option>
      <option value="despesa">Despesa</option>
    </select>
    <button onclick="salvarEdicao()">💾 Salvar</button>
    <button class="cancelar" onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// ============ FIREBASE ============
const firebaseConfig = {
  apiKey: "AIzaSyDZOBMaeSISkVf9_NCfcY-C8J1Mb4r4ncc",
  authDomain: "controle-financeiro-rural.firebaseapp.com",
  projectId: "controle-financeiro-rural",
  storageBucket: "controle-financeiro-rural.firebasestorage.app",
  messagingSenderId: "280064239916",
  appId: "1:280064239916:web:a14267e58e5d37c5ce6489"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const colecao = db.collection("lancamentos");

// ============ MÊS SELECTOR ============
const mesEl = document.getElementById("mes");
const hoje = new Date();

for(let i = 0; i < 12; i++){
  const d = new Date(hoje.getFullYear(), hoje.getMonth() - i, 1);
  const valor = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  const label = d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const opt = document.createElement('option');
  opt.value = valor;
  opt.textContent = label.charAt(0).toUpperCase() + label.slice(1);
  mesEl.appendChild(opt);
}

document.getElementById("data").value = hoje.toISOString().split('T')[0];

let mesSelecionado = mesEl.value;
let unsubscribe = null;
let grafico = null;
let lancamentosCache = [];

mesEl.addEventListener("change", () => {
  mesSelecionado = mesEl.value;
  assinarLancamentos();
});

// ============ LISTENER TEMPO REAL ============
function assinarLancamentos(){
  if(unsubscribe) unsubscribe();

  const [ano, mes] = mesSelecionado.split('-');
  const inicio = new Date(ano, mes-1, 1).toISOString().split('T')[0];
  const fim    = new Date(ano, mes,   1).toISOString().split('T')[0];

  unsubscribe = colecao
    .where('data', '>=', inicio)
    .where('data', '<',  fim)
    .orderBy('data', 'desc')
    .onSnapshot(snapshot => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app-content').style.display = 'block';

      const lista = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      lancamentosCache = lista;
      renderizar(lista);
    }, err => {
      console.error(err);
      document.getElementById('loading').textContent = '❌ Erro ao conectar. Verifique o Firestore.';
    });
}

assinarLancamentos();

// Cache global para modal (todos os docs)
colecao.onSnapshot(snap => {
  lancamentosCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
});

// ============ RENDERIZAR ============
function renderizar(lancamentos){
  let receitas = 0, despesas = 0;
  const categorias = {};
  const listaEl = document.getElementById("lista");
  listaEl.innerHTML = "";

  if(lancamentos.length === 0){
    listaEl.innerHTML = '<p class="empty">Nenhum lançamento neste mês.</p>';
  }

  lancamentos.forEach(l => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div class="item-info" onclick="abrirModal('${l.id}')">
        ${l.data ? formatarData(l.data) + ' — ' : ''}${l.descricao}<br>
        <small>${l.categoria}</small>
      </div>
      <span class="${l.tipo === 'receita' ? 'valorReceita' : 'valorDespesa'}">
        ${l.tipo === 'receita' ? '+' : '-'}${fmt(l.valor)}
      </span>
      <button class="excluir" onclick="excluir('${l.id}')">✕</button>
    `;
    listaEl.appendChild(div);

    if(l.tipo === 'receita'){
      receitas += l.valor;
    } else {
      despesas += l.valor;
      categorias[l.categoria] = (categorias[l.categoria] || 0) + l.valor;
    }
  });

  const saldo = receitas - despesas;
  document.getElementById("totalReceitas").textContent = fmt(receitas);
  document.getElementById("totalDespesas").textContent = fmt(despesas);
  const saldoEl = document.getElementById("saldoTotal");
  saldoEl.textContent = fmt(saldo);
  saldoEl.style.color = saldo >= 0 ? "#22c55e" : "#ef4444";

  desenharGrafico(categorias);
}

// ============ GRÁFICO ============
function desenharGrafico(categorias){
  const ctx = document.getElementById("grafico");
  if(grafico) grafico.destroy();

  if(Object.keys(categorias).length === 0) return;

  grafico = new Chart(ctx, {
    type: "pie",
    data: {
      labels: Object.keys(categorias),
      datasets: [{
        data: Object.values(categorias),
        backgroundColor: ['#7c3aed','#ef4444','#22c55e','#f59e0b','#3b82f6','#ec4899','#14b8a6']
      }]
    },
    options: {
      plugins: {
        legend: { labels: { color: "#fff" } }
      }
    }
  });
}

// ============ ADICIONAR ============
document.getElementById("form-lancamento").addEventListener("submit", async e => {
  e.preventDefault();

  const lancamento = {
    data:      document.getElementById("data").value,
    descricao: document.getElementById("descricao").value.trim(),
    valor:     parseFloat(document.getElementById("valor").value),
    categoria: document.getElementById("categoria").value,
    tipo:      document.getElementById("tipo").value,
    criadoEm:  firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    await colecao.add(lancamento);
    e.target.reset();
    document.getElementById("data").value = hoje.toISOString().split('T')[0];
  } catch(err){
    alert("Erro ao salvar: " + err.message);
  }
});

// ============ EXCLUIR ============
async function excluir(id){
  if(!confirm("Excluir este lançamento?")) return;
  await colecao.doc(id).delete();
}

// ============ MODAL EDIÇÃO ============
function abrirModal(id){
  const l = lancamentosCache.find(x => x.id === id);
  if(!l) return;

  document.getElementById("edit-id").value        = id;
  document.getElementById("edit-data").value      = l.data;
  document.getElementById("edit-descricao").value = l.descricao;
  document.getElementById("edit-valor").value     = l.valor;
  document.getElementById("edit-categoria").value = l.categoria;
  document.getElementById("edit-tipo").value      = l.tipo;

  document.getElementById("modal-overlay").classList.add("open");
}

function fecharModal(){
  document.getElementById("modal-overlay").classList.remove("open");
}

async function salvarEdicao(){
  const id = document.getElementById("edit-id").value;
  const atualizado = {
    data:      document.getElementById("edit-data").value,
    descricao: document.getElementById("edit-descricao").value.trim(),
    valor:     parseFloat(document.getElementById("edit-valor").value),
    categoria: document.getElementById("edit-categoria").value,
    tipo:      document.getElementById("edit-tipo").value,
  };

  try {
    await colecao.doc(id).update(atualizado);
    fecharModal();
  } catch(err){
    alert("Erro ao editar: " + err.message);
  }
}

document.getElementById("modal-overlay").addEventListener("click", e => {
  if(e.target === e.currentTarget) fecharModal();
});

// ============ HELPERS ============
function fmt(v){
  return v.toLocaleString('pt-BR', { style:'currency', currency:'BRL' });
}

function formatarData(str){
  const [a,m,d] = str.split('-');
  return `${d}/${m}/${a}`;
}
</script>
</body>
</html>
